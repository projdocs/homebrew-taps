name: release.yml
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: generate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: rm -rf ./Formula

      - name: Generate formulae
        run: go run ./generate.go

      - name: Push formulae
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Formula/
          git diff --staged --quiet && echo "No changes, skipping" && exit 0
          git commit -m "chore: update formulae"
          git push
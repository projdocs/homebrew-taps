name: release.yml
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: generate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate formulae
        run: go run ./generate.go

      - name: Push formulae
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff --staged --quiet || git commit -m "chore: update formulae"
          git push